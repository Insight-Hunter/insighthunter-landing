name: Deploy React App

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install

      - name: Ensure React & MUI installed
        run: npm install react react-dom @mui/material @emotion/react @emotion/styled

      - name: Build app
        run: npm run build

      # Add deploy step here (ex: GitHub Pages, Netlify, your custom command)
      # Example for GitHub Pages using gh-pages
      # - name: Deploy to GitHub Pages
      #   run: npm run deploy
      #   env:
      #     GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
